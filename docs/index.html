<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CoreKit — Flutter Engine & UI Bundle Documentation</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="CoreKit is a premium Flutter package that bundles production-ready UI widgets, responsive scaling, networking, secure storage, and authentication.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Modern Inter Font & Material Icon fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Theme style sheet -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <style>
    :root {
      /* Curated HSL Premium Color Palette */
      --theme-color: #0284c7; /* Vibrant Sky Blue */
      --textColor: #334155;
      --background: #f8fafc;
      --sidebar-background: #ffffff;
      
      --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    
    body {
      font-family: var(--font-family);
      -webkit-font-smoothing: antialiased;
      background-color: var(--background);
    }
    
    /* Premium Header styles */
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Outfit', var(--font-family);
      font-weight: 600;
      color: #0f172a;
    }
    
    .sidebar {
      background-color: var(--sidebar-background);
      border-right: 1px solid #e2e8f0;
      font-family: var(--font-family);
    }
    
    /* Navigation link styling in sidebar */
    .sidebar-nav li a {
      font-size: 14px;
      font-weight: 500;
      color: #64748b;
      padding: 6px 0;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .sidebar-nav li a:hover {
      color: var(--theme-color);
      transform: translateX(3px);
    }
    
    .sidebar-nav li.active > a {
      color: var(--theme-color);
      font-weight: 600;
      border-right: 2px solid var(--theme-color);
    }
    
    /* Custom Search box */
    .search input {
      border: 1px solid #cbd5e1 !important;
      border-radius: 8px !important;
      background: #f1f5f9 !important;
      padding: 8px 12px !important;
      font-family: var(--font-family) !important;
      transition: all 0.2s ease !important;
    }
    
    .search input:focus {
      border-color: var(--theme-color) !important;
      box-shadow: 0 0 0 2px rgba(2, 132, 199, 0.15) !important;
      background: #ffffff !important;
    }
    
    /* Premium Code Highlight Box styling */
    code, pre {
      font-family: "Fira Code", Consolas, Monaco, monospace !important;
      border-radius: 8px !important;
    }
    
    pre {
      background-color: #0f172a !important; /* Dark Slate Slate */
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      border: 1px solid #1e293b;
    }
    
    pre code {
      color: #f8fafc !important;
      text-shadow: none !important;
    }
    
    .markdown-section code {
      background-color: #f1f5f9;
      color: #0f766e;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
    }
    
    /* Responsive custom spacing for content */
    .markdown-section {
      max-width: 900px;
      padding: 30px 15px 40px;
    }
  </style>
</head>
<body>
  <div id="app">Loading premium documentation...</div>
  <script>
    window.$docsify = {
      name: 'CoreKit',
      repo: 'kmmuzahid/flutter_core_kit',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      homepage: 'https://raw.githubusercontent.com/kmmuzahid/flutter_core_kit/main/README.md', // Always load latest clean README directly
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search Documentation...',
        noData: 'No results found!',
        depth: 6
      },
      copyCode: {
        buttonText : 'Copy Code',
        errorText  : 'Error',
        successText: 'Copied'
      }
    }
  </script>
  <!-- Docsify Framework JS -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- Full Text Search Engine -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <!-- Quick Copy Code Plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <!-- Syntax highlighting for Dart and Bash -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-dart.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
