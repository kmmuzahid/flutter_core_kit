include: package:flutter_lints/flutter.yaml

analyzer:
    
  language:
    strict-casts: false
    strict-inference: false
    # strict-raw-types: true 
  errors:
    # This turns inference failures into hard errors
    todo: ignore 
    argument_type_not_assignable: error
    dangling_library_doc_comments: ignore
    unintended_html_in_doc_comment: ignore
    type_annotate_public_apis: ignore
    strict_top_level_inference: ignore
    library_private_types_in_public_api: ignore 
    camel_case_types: ignore
    use_build_context_synchronously: ignore
    constant_identifier_names: ignore
    camel_case_extensions: ignore

linter:
  rules:
    # --- ERROR PRONE RULES ---
    - avoid_slow_async_io
    - no_duplicate_case_values 
    - test_types_in_equals
    - valid_regexps

    # --- THE RULE FOR DYNAMIC ---
    - avoid_annotating_with_dynamic

    # --- STYLE & ARCHITECTURE ---
    - always_use_package_imports
    - avoid_void_async
    - directives_ordering
    - omit_local_variable_types
    - prefer_final_locals
    - prefer_interpolation_to_compose_strings
    - unawaited_futures: false
    - prefer_collection_literals
    - type_annotate_public_apis

    # --- FLUTTER SPECIFIC ---
    - avoid_unnecessary_containers
    - prefer_const_constructors
    - prefer_const_declarations
    - prefer_const_literals_to_create_immutables
    - sized_box_for_whitespace
    - use_key_in_widget_constructors