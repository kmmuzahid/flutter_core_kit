name: core_kit
description: "A Flutter package bundling production-ready UI widgets, responsive layout helpers, Dio-based networking with token refresh, secure storage, and authentication modules."
version: 1.0.2
homepage: https://github.com/kmmuzahid/flutter_core_kit.git

environment:
  sdk: ^3.12.2

platforms:
  android:
  ios:
  macos:
  windows:
  linux:
  web:

dependencies:
  flutter:
    sdk: flutter
  universal_io: ^2.2.2
  intl: ^0.20.2
  flutter_html: ^3.0.0 

  skeletonizer: ^2.1.3
  file_picker: ^11.0.2
  flutter_country_state: ^1.0.2
  flutter_svg: ^2.3.0
  cached_network_image: ^3.4.1
  image_picker: ^1.2.2
  permission_handler: ^12.0.3
  dio: ^5.9.2
  intl_phone_field_v2: ^4.0.5

  share_plus: ^12.0.2
  http: ^1.6.0
  path_provider: ^2.1.5
  http_parser: ^4.1.2
  flutter_reorderable_grid_view: ^5.7.0
  
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.5.5
  android_id: ^0.5.1
  uuid: ^4.5.3
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 


flutter:
  uses-material-design: true
  assets:
    - assets/images/
