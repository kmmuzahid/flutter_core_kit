name: core_kit
description: "A Flutter package bundling production-ready UI widgets, responsive layout helpers, Dio-based networking with token refresh, secure storage, and authentication modules."
version: 1.0.0+27
homepage: https://github.com/kmmuzahid/flutter_core_kit.git

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  intl:
  flutter_html: # flutter_auto_size_text:

  skeletonizer:
  file_picker:
  flutter_country_state:
  flutter_svg:
  cached_network_image:
  image_picker:
  permission_handler:
  dio:
  intl_phone_field_v2: # another_flushbar:

  share_plus:
  http: any
  path_provider: any
  http_parser: any
  flutter_reorderable_grid_view:  
  
  flutter_secure_storage: any
  shared_preferences: any
  android_id: any
  uuid: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 

dependency_overrides:
  win32: ^6.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
